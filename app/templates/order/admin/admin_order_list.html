{% extends "layouts/base.html" %}
{% block content %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/order.css') }}">

<div class="order-container">
    <h2>All Orders</h2>

    <table class="order-table">
        <thead>
            <tr>
                <th>Code</th>
                <th>User</th>
                <th>Status</th>
                <th>Total</th>
                <th></th>
            </tr>
        </thead>
        <tbody>
            {% for order in orders %}
            <tr>
                <td>{{ order.code }}</td>
                <td>{{ order.user.email }}</td>
                <td>
                    {% include "order/components/order_status_badge.html" %}
                </td>
                <td>{{ order.total_amount }}</td>
                <td>
                    <a href="{{ url_for('admin.order_detail', id=order.id) }}" 
                       class="btn btn-outline">View</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
