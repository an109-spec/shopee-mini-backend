{% extends "seller/layout_seller.html" %}

{% block seller_content %}

<h2>Tạo sản phẩm</h2>

<form method="post">

<div>
<label>Tên sản phẩm</label>
<input name="name">
</div>

<div>
<label>Giá</label>
<input name="price">
</div>

<div>
<label>Tồn kho</label>
<input name="stock">
</div>

<div>
<label>Mô tả</label>
<textarea name="description"></textarea>
</div>

<button type="submit">
Tạo sản phẩm
</button>

</form>

{% endblock %}
