{% extends "seller/layout_seller.html" %}

{% block styles %}
<link rel="stylesheet"
href="{{ url_for('static', filename='css/seller_promotion.css') }}">
{% endblock %}

{% block seller_content %}

<div class="promotion-box">

<h2>Edit Flash Sale</h2>

<form class="seller-form">

<label class="section-title">Chọn sản phẩm</label>

<div class="product-grid">

{% for p in products %}

<div class="product-box">

<label>
<input type="checkbox"
class="productCheck"
value="{{ p.id }}">

<strong>{{ p.name }}</strong>
</label>

<div id="variantBox-{{ p.id }}" class="variant-box"></div>

</div>

{% endfor %}

</div>

<label class="select-all">
<input type="checkbox" id="selectAllVariants">
Chọn tất cả
</label>


<!-- PRICE -->

<div class="flash-price-panel">

<div class="price-row">
<label>Giá gốc</label>

<input
type="text"
id="originPrice"
readonly
class="price-input">
</div>

<div class="price-row">
<label>Giảm (%)</label>

<input
type="number"
id="discountPercentInput"
value="{{ flash.discount_percent }}"
class="price-input">
</div>

</div>


<!-- STOCK -->

<div class="stock-panel">

<label>Số lượng Flash Sale</label>

<input type="number"
id="stock"
value="{{ flash.stock_limit }}"
required>

<div id="stockInfo" class="stock-info">
Tồn kho: -
</div>

</div>


<!-- TIME -->

<div class="time-panel">

<label>Bắt đầu</label>

<input type="datetime-local"
name="start_time"
value="{{ flash.start_time.strftime('%Y-%m-%dT%H:%M') }}"
required>

<label>Kết thúc</label>

<input type="datetime-local"
name="end_time"
value="{{ flash.end_time.strftime('%Y-%m-%dT%H:%M') }}"
required>

</div>


<script>
const FLASH_ID = {{ flash.id | int }}
</script>

<button
type="button"
class="btn btn--primary"
onclick="updateFlashSale(FLASH_ID)">
Cập nhật Flash Sale
</button>

</form>

</div>

{% endblock %}

{% block scripts %}
<script>
const FLASH_UPDATE_URL = "/api/flash-sale/0/update"
</script>
<script src="{{ url_for('static', filename='js/promotion/promotion_common.js') }}"></script>

<script src="{{ url_for('static',filename='js/promotion/flash_sale.js') }}"></script>

{% endblock %}
