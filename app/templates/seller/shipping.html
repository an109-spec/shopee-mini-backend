{% extends "seller/layout_seller.html" %}

{% block seller_content %}
<h2>Cài đặt vận chuyển</h2>
<form id="shippingForm" class="seller-form">
  <label><input type="checkbox" name="fast" {% if shop.shipping_fast %}checked{% endif %}> Giao nhanh</label>
  <label><input type="checkbox" name="same_day" {% if shop.shipping_same_day %}checked{% endif %}> Giao trong ngày</label>
  <label><input type="checkbox" name="self_delivery" {% if shop.shipping_self_delivery %}checked{% endif %}> Tự giao</label>
  <label>Phí ship</label>
  <input type="number" step="1000" min="0" name="shipping_fee" value="{{ shop.shipping_fee or 0 }}">
  <button class="btn btn--primary" type="button" onclick="saveShipping()">Lưu cấu hình</button>
</form>
<script>
function saveShipping(){
  const f = document.getElementById('shippingForm');
  fetch('/seller/api/shipping',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({
    fast:f.fast.checked,same_day:f.same_day.checked,self_delivery:f.self_delivery.checked,shipping_fee:f.shipping_fee.value
  })}).then(()=>location.reload());
}
</script>
{% endblock %}
