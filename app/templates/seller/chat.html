{% extends "seller/layout_seller.html" %}

{% block seller_content %}
<h2>Chat khách hàng</h2>
<div class="dashboard-cards">
  <div class="dashboard-card">
    <h4>Danh sách chat</h4>
    <ul>
      {% for room in rooms %}
      <li>Room #{{ room.id }} - Buyer {{ room.buyer_id }}</li>
      {% endfor %}
    </ul>
  </div>
  <div class="dashboard-card">
    <h4>Khung chat</h4>
    <p>Dùng API POST /seller/api/chat/message để gửi tin nhắn.</p>
  </div>
</div>
{% endblock %}
