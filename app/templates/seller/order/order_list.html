{% extends "seller/layout_seller.html" %}

{% block seller_content %}

<th>Khách</th>
<th>Tổng tiền</th>
<th>Trạng thái</th>

{% for order in orders %}

<td>{{ order.total }}</td>

<td>{{ order.status }}</td>

<td>

</td>

</tr>

{% endfor %}

</table>

{% endblock %}
