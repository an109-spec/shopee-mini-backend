{% extends "seller/layout_seller.html" %}

{% block seller_content %}
<h2>Quản lý đơn hàng</h2>
<p>Bộ lọc: All | Pending | Preparing | Shipping | Delivered | Cancelled</p>
<table>
    <tr><th>OrderID</th><th>Tổng</th><th>Trạng thái</th></tr>
  {% for order in orders %}
  <tr>
    <td>#{{ order.id }}</td>
    <td>{{ order.total_price }}</td>
    <td>{{ order.status.value }}</td>
  </tr>
  {% endfor %}
</table>
{% endblock %}
