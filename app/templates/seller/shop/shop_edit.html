{% extends "seller/layout_seller.html" %}

{% block seller_content %}

<h2>Chỉnh sửa Shop</h2>

<form method="post">

<div>
<label>Tên shop</label>
<input type="text" name="name" value="{{ shop.name }}">
</div>

<div>
<label>Mô tả</label>
<textarea name="description">{{ shop.description }}</textarea>
</div>

<button type="submit">
Cập nhật
</button>

</form>

{% endblock %}
