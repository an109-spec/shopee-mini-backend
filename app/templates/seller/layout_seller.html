<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Kênh Người Bán{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/seller.css') }}">

</head>

<body>
<header class="seller-topbar">
<div class="seller-topbar__inner">
    <div class="seller-topbar__brand">
      <a href="{{ url_for('home.home_page') }}">OneShop</a>
      <span>Kênh Người Bán</span>
    </div>
    <div class="seller-topbar__meta">
      {% if current_shop %}<span>{{ current_shop.name }}</span> {% endif %}
      <span>🔔</span>
      <span>{{ current_user.username if current_user else 'Seller' }}</span>
    </div>
  </div>
</header>

<main class="seller-main-layout">
  <aside class="seller-sidebar">
    <a href="{{ url_for('seller.dashboard') }}">Dashboard</a>
    <a href="{{ url_for('seller.product_list') }}">Products</a>
    <a href="{{ url_for('seller.orders_page') }}">Orders</a>
    <a href="{{ url_for('seller.chat_page') }}">Chat</a>
    <a href="{{ url_for('seller.promotions_page') }}">Promotions</a>
    <a href="{{ url_for('seller.revenue_page') }}">Revenue</a>
    <a href="{{ url_for('seller.shop_settings_page') }}">Shop Settings</a>
  </aside>

  <section class="seller-main-content">
    {% block seller_content %}{% endblock %}
  </section>
</main>

<script src="{{ url_for('static', filename='js/seller.js') }}"></script>

</body>
</html>
