<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Kênh Người Bán{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/seller.css') }}">

</head>

<body>
<header class="seller-topbar">
    <div class="seller-topbar__inner">
      <div class="seller-topbar__brand">
        <a href="{{ url_for('home.home_page') }}">Shopee</a>
          <span>Kênh Người Bán</span>
      </div>
      <div class="seller-topbar__user">{{ current_user.username if current_user else 'Seller' }}</div>
    </div>
  </header>

<main class="seller-main">{% block content %}{% endblock %}</main>

  <script src="{{ url_for('static', filename='js/seller.js') }}"></script>

</body>
</html>
