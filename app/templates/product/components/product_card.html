<article class="product-card">
  <img src="{{ product.thumbnail or '' }}" alt="{{ product.name }}" class="product-card__thumb">
  <h4 class="product-card__name">{{ product.name }}</h4>
  <p class="product-card__price">{{ product.price }}</p>
  <a class="btn btn--outline" href="/product/{{ product.id }}">Xem chi tiết</a>
</article>
