<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Nhập mã OTP</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
        }
        .container {
            width: 400px;
            margin: 80px auto;
            padding: 30px;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        h2 {
            text-align: center;
            margin-bottom: 20px;
        }
        input, select {
            width: 100%;
            padding: 10px;
            margin: 8px 0 16px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            width: 100%;
            padding: 10px;
            background-color: #ee4d2d;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #d73211;
        }
        .error {
            color: red;
            margin-bottom: 10px;
            text-align: center;
        }
        .success {
            color: green;
            margin-bottom: 10px;
            text-align: center;
        }
        .note {
            font-size: 13px;
            color: #666;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
<div class="container">
    <h2>Xác thực OTP</h2>

    {% if error %}
        <div class="error">{{ error }}</div>
    {% endif %}

    <div class="note">
        Vui lòng nhập mã OTP đã được gửi tới email hoặc số điện thoại của bạn.
    </div>

    <form method="POST">

        <!-- Giữ identifier -->
        <input type="hidden" name="identifier" value="{{ identifier }}">

        <label>Chọn loại OTP</label>
        <select name="otp_type" required>
            <option value="email">Email</option>
            <option value="sms">SMS</option>
        </select>

        <label>Mã OTP</label>
        <input type="text" name="otp_code" placeholder="Nhập mã OTP" required>

        <label>Mật khẩu mới</label>
        <input type="password" name="new_password" placeholder="Nhập mật khẩu mới" required>

        <button type="submit">Đặt lại mật khẩu</button>
    </form>
</div>
</body>
</html>
